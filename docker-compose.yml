services:
  postgres:
    image: postgres:16-alpine
    container_name: noah-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: noah
      POSTGRES_PASSWORD: noah
      POSTGRES_DB: noah
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noah"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: noah-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: noah
      KC_DB_PASSWORD: noah
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:9.2
    container_name: noah-supertokens
    restart: unless-stopped
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://noah:noah@postgres:5432/supertokens
    ports:
      - "3567:3567"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
